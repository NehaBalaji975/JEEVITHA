    <div class="letter" data-content="Life is one odd lengthy journey with random experiences that stem from our own thoughts and perspectives. And every person we meet on this journey, is unique and strange.

If I have to tell you what I think of you, my mind conjures the image of the breeze near the ocean.

So alive with its contrast of being loud for those who seek its presence and silent for those who seek its calm.  You are so much like that ,Jeevi.

You appear to be the quiet kid in class who could be less bothered with all that happens around you, but in that silence is a voice screaming to be seen, understood and accompanied. 

I can still see the way the whole class looked at you like a mystery and those crazy stories that revolved made you seem like the celebrity of the class and how I've thought of what it would be to talk to you in person.

But everything has a time,right ? For the fireworks to shine bright, we need to wait for the night time. And our time came in the third year. I kinda feel sad we missed two years where we could've had lots of fun and memories together.

But you found me at my lowest. I don't know if you've ever noticed, but the  third year of college was my most dark time. I was battling with a lots of feelings, unfamiliar anger and angst that was inherently redefining me as a person.  And I guess, without you there it would've been worse. 

It may not have been a big act of significance for you but the way you walked with me on that fine arts day was such the biggest gesture that spoke volumes to me. I am damn sure I would've lost it and cried that day if it weren't for you. The way you kept telling me that you were fine with spending your time accompanying me to the stalls rather than spending it with your friends made me wanna break down and cry as to how much it meant to me,Jeevi. 

You are such a soul of kindness, empathy and compassion.  And every other moment spent with you in the juice corner, canteen, bakery, class or the council room are all moments I'd like to carry with me for life.

You weren't a mere person from college or someone I wanted to talk to cause our interests lined up. You've somehow infiltrated into my life and caught for yourself a large space in it. 

The way you talk softly and the way it hitches high when you laugh, tease or get angry and the way you articulate your body language , your principles on life, the way you so effortlessly interact with people and view people makes me feel astonished and taken aback every time.  I have no clue how you do it, Jeevi. You're simply too good. 

The way you handle pain which most people would be broken by, is seriously inspiring.
You're a strong woman and a warrior more than anything,Jeevi.

I wish for all the goodness in your life. Keep smiling bro and I wish in every part of this journey, you'll have an abundance of peace, laughter, victories, passion , prosperity and moments to cherish.

Happy Birthday, Jeevi.

Let me be selfish on your big day, and wish not only for your happiness but pray for us to be friends forever.

Once again, many more happy returns of the day, My Jeevi. 💖✨">
